<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SSLCommerz Payment</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #007bff, #6610f2);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
      }
      .card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      }
      .btn-custom {
        background-color: #28a745;
        border: none;
        transition: all 0.3s ease;
      }
      .btn-custom:hover {
        background-color: #218838;
        transform: scale(1.05);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card text-center p-5 bg-light text-dark">
            <h2 class="fw-bold text-primary mb-3">
              SSLCommerz Payment Gateway
            </h2>
            <p class="mb-4">
              Click the button below to start a secure test transaction.
            </p>
            <a href="/init" class="btn btn-custom btn-lg px-5">
              Start Payment
            </a>
            <p class="mt-4 text-muted small">
              Sandbox Mode — Transactions are for testing only.
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
