<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <h2>📊 Registered User Dashboard</h2>

  <div class="card p-3 mt-3" style="width:300px;">
    <h4>Total Registered Users:</h4>
    <h1 id="count" class="text-primary">0</h1>
  </div>

  <a href="/register" class="btn btn-success mt-3">Register New User</a>

  <script>
   async function countusers(){
    const res=await fetch('/dashboard');
    const data=await res.json();
    document.getElementById('count').textContent = data.totalUsers;
   }
   countusers();
  </script>
</body>
</html>
