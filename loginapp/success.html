<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Success | YourApp</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-family: 'Poppins', sans-serif;

      /* 👇 matching background */
      background-color: hsl(218, 41%, 15%);
      background-image:
        radial-gradient(
          650px circle at 0% 0%,
          hsl(218, 41%, 35%) 15%,
          hsl(218, 41%, 30%) 35%,
          hsl(218, 41%, 20%) 75%,
          hsl(218, 41%, 19%) 80%,
          transparent 100%
        ),
        radial-gradient(
          1250px circle at 100% 100%,
          hsl(218, 41%, 45%) 15%,
          hsl(218, 41%, 30%) 35%,
          hsl(218, 41%, 20%) 75%,
          hsl(218, 41%, 19%) 80%,
          transparent 100%
        );
      z-index: -1;
    }

    .success-card {
      background-color: hsla(0, 0%, 100%, 0.9);
      backdrop-filter: saturate(200%) blur(25px);
      border-radius: 1.5rem;
      box-shadow: 0 4px 25px rgba(0, 0, 0, 0.2);
      text-align: center;
      padding: 40px 30px;
      max-width: 400px;
    }

    .icon {
      font-size: 70px;
      color: #28a745;
      margin-bottom: 20px;
    }

    .btn-primary {
      border-radius: 25px;
      padding: 10px 25px;
    }
  </style>
</head>

<body>
  <div class="success-card">
    <div class="icon">
      <i class="fas fa-check-circle"></i>
    </div>
    <h2 class="fw-bold text-success">Success!</h2>
    <p class="text-dark mb-4">
      Your account has been login successfully.<br>
      Welcome aboard!
    </p>
    <a href="/payment" class="btn btn-primary">Payment</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
